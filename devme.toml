schema_version = 1

[stack]
name = "devme-native-template"
description = "Native iOS and Android starter with a self-hosted Convex backend"

env_file = ".env.auth.local"

[env.AUTH_APP_NAME]
required = true
default = "Starter"
help = "Display name used by Better Auth."

[env.GOOGLE_WEB_CLIENT_ID]
required = true
help = "Google web OAuth client ID for native Google sign-in. Create it using https://console.cloud.google.com/apis/credentials."
setup_url = "https://console.cloud.google.com/apis/credentials"

[env.GOOGLE_IOS_CLIENT_ID]
required = true
help = "Google iOS OAuth client ID for iOS Google sign-in."
setup_url = "https://console.cloud.google.com/apis/credentials"

[env.GOOGLE_ANDROID_CLIENT_ID]
required = true
help = "Google Android OAuth client ID for the Android package and signing certificate."
setup_url = "https://console.cloud.google.com/apis/credentials"

[env.GOOGLE_CLIENT_SECRET]
required = true
help = "Google web OAuth client secret used by the Better Auth Google provider."
setup_url = "https://console.cloud.google.com/apis/credentials"
secret = true

[env.APPLE_CLIENT_ID]
required = true
help = "Apple Services ID used by the Better Auth Apple provider."
setup_url = "https://developer.apple.com/help/account/capabilities/configure-sign-in-with-apple-for-the-web"

[env.APPLE_TEAM_ID]
required = true
help = "Apple Developer Team ID."
setup_url = "https://developer.apple.com/help/account/basics/account-landing-page"

[env.APPLE_KEY_ID]
required = true
help = "Sign in with Apple private key ID."
setup_url = "https://developer.apple.com/help/account/keys/get-a-key-identifier"

[env.APPLE_PRIVATE_KEY_FILE]
required = true
help = "Absolute path to the downloaded Sign in with Apple .p8 key. Keep the key outside this repository."
setup_url = "https://developer.apple.com/help/account/capabilities/create-a-sign-in-with-apple-private-key"

[env.APPLE_APP_BUNDLE_IDENTIFIER]
required = true
help = "iOS bundle identifier registered for Sign in with Apple."
setup_url = "https://developer.apple.com/help/account/capabilities/about-sign-in-with-apple"

[env.STRIPE_SECRET_KEY]
required = true
help = "Stripe sandbox secret key. Add billing only after confirming store-policy eligibility."

[env.STRIPE_WEBHOOK_SECRET]
required = true
help = "Stripe CLI webhook signing secret for local subscription testing."

[env.STRIPE_PRICE_ID]
required = true
help = "Stripe sandbox recurring price ID."

[workspace.members]
backend = "backend"
ios = "apps/ios"
android = "apps/android"

[logs]
redact = [
  "(?i)authorization: bearer [^[:space:]]+",
  "(?i)set-auth-token: [^[:space:]]+",
  "BETTER_AUTH_SECRET=[^[:space:]]+",
  "CONVEX_DEPLOY_KEY=[^[:space:]]+",
  "(?i)STRIPE_(SECRET_KEY|WEBHOOK_SECRET)=[^[:space:]]+",
  "whsec_[A-Za-z0-9_]+",
  "(?i)(development|production):[A-Za-z0-9_-]+\\|[A-Za-z0-9_-]+",
]
retention_bytes = 16777216

[step.bun]
check = "command -v bun >/dev/null"
provision = "printf 'Install Bun 1.3.13 or newer from https://bun.sh/docs/installation\n' >&2; exit 1"
trust = "manual"

[step.dependencies]
check = "test -d node_modules && test -d backend/node_modules && cmp -s bun.lock .devme/bun-lock.installed"
provision = "bun install --frozen-lockfile && mkdir -p .devme && cp bun.lock .devme/bun-lock.installed"
trust = "auto"
depends_on = ["bun"]

[step.docker]
check = "docker info >/dev/null 2>&1"
provision = "printf 'Start Docker Desktop or OrbStack, then retry.\n' >&2; exit 1"
trust = "manual"

[step.stripe-cli]
check = "command -v stripe >/dev/null"
provision = "printf 'Install Stripe CLI from https://docs.stripe.com/stripe-cli/install, then retry.\n' >&2; exit 1"
trust = "manual"

[task.tooling-test]
kind = "check"
visibility = "internal"
description = "Verify worktree ports and native device helpers"
cmd = "bash -n tooling/stripe-webhooks.sh && devme config check && bash tooling/devme-ports.test.sh && bash tooling/convex.test.sh && bash tooling/ios-device.test.sh && bash tooling/ios-simulator.test.sh && bash tooling/ios-simulator-ready.test.sh && bash tooling/ios-test.test.sh && bash tooling/android-emulator-lifecycle.test.sh && bash tooling/android-emulator.test.sh"
steps = ["dependencies"]
timeout = 180

[task.typescript-check]
kind = "check"
visibility = "internal"
description = "Format-check, lint, and type-check TypeScript"
cmd = "bun run check"
steps = ["dependencies"]
timeout = 180

[task.recipe-e2e]
kind = "check"
visibility = "internal"
description = "Create a fresh project and exercise reversible feature composition"
cmd = "bash tooling/recipe-e2e.sh"
timeout = 900

[task.ci-core]
kind = "check"
visibility = "internal"
description = "Run portable tooling and backend CI checks"
depends_on = [
  "tooling-test",
  "typescript-check",
  "backend::test",
  "backend::live-smoke",
  "backend::auth-live-smoke",
  "backend::contract-check",
]

[task.verify]
kind = "check"
description = "Run every deterministic repository check"
depends_on = ["ci-core", "ios::test", "ios::e2e", "android::test", "android::e2e"]

[resource.ios-simulator]
scope = "host"
capacity = 1
env = "SIMULATOR_SLOT"

[resource.ios-device]
scope = "host"
capacity = 1
env = "IOS_DEVICE_SLOT"

[resource.android-sdk]
scope = "host"
capacity = 2
env = "ANDROID_BUILD_SLOT"

[resource.android-emulator]
scope = "host"
capacity = 2
env = "ANDROID_EMULATOR_SLOT"
