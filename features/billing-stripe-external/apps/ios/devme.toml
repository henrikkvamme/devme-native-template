schema_version = 1

[step.tailscale]
check = "command -v tailscale >/dev/null && tailscale status --json 2>/dev/null | bun -e 'const status = await Bun.stdin.json(); if (status.BackendState !== \"Running\" || !status.Self?.Online) process.exit(1)'"
provision = "printf 'Install and connect Tailscale on this Mac, then retry.\n' >&2; exit 1"
trust = "manual"
depends_on = ["root::bun"]

[task.simulator]
kind = "launch"
description = "Build and launch Starter in the iOS Simulator"
cmd = "DEVME_SLOT={slot} ../../tooling/ios-simulator.sh"
depends_on = ["backend::deploy"]
steps = ["root::dependencies"]
services = ["backend::convex", "backend::stripe-webhooks"]
timeout = 1200

[task.device]
kind = "launch"
description = "Build, install, and launch Starter on a connected iPhone"
cmd = "DEVME_SLOT={slot} ../../tooling/ios-device.sh launch"
depends_on = ["device-backend"]
steps = ["root::dependencies", "tailscale"]
services = ["backend::convex", "backend::stripe-webhooks"]
resources = ["root::ios-device"]
timeout = 1200
artifacts = [".devme/ios-device-build-{slot}.log"]

[task.test]
kind = "check"
visibility = "internal"
description = "Build and test the iOS app on a simulator"
cmd = "DEVME_SLOT={slot} ../../tooling/ios-test.sh"
services = ["backend::convex"]
resources = ["root::ios-simulator"]
timeout = 1200
artifacts = [".devme/DerivedData-{slot}/Logs/Test"]

[task.e2e]
kind = "check"
visibility = "internal"
description = "Verify an iOS mutation and reactive UI in Simulator"
cmd = "DEVME_SLOT={slot} ../../tooling/ios-e2e.sh"
depends_on = ["backend::deploy"]
steps = ["root::dependencies"]
services = ["backend::convex"]
resources = ["root::ios-simulator"]
timeout = 1200
artifacts = [".devme/ios-e2e-{slot}.xcresult", ".devme/ios-e2e-attachments-{slot}"]

[task.device-e2e]
kind = "check"
visibility = "internal"
description = "Verify the Convex mutation and reactive UI on a physical iPhone"
cmd = "DEVME_SLOT={slot} ../../tooling/ios-device.sh e2e"
depends_on = ["device-backend"]
steps = ["root::dependencies", "tailscale"]
services = ["backend::convex"]
resources = ["root::ios-device"]
timeout = 1200
artifacts = [".devme/ios-device-e2e-{slot}.xcresult", ".devme/ios-device-e2e-attachments-{slot}"]

[task.device-backend]
kind = "utility"
visibility = "internal"
description = "Expose local Convex through private Tailscale HTTPS"
cmd = "DEVME_SLOT={slot} ../../tooling/tailscale-convex.sh ensure"
depends_on = ["backend::deploy"]
steps = ["tailscale"]
services = ["backend::convex"]
timeout = 120

[task.device-backend-stop]
kind = "utility"
visibility = "internal"
description = "Remove this worktree's physical-device Tailscale endpoint"
cmd = "DEVME_SLOT={slot} ../../tooling/tailscale-convex.sh stop"
steps = ["tailscale"]
timeout = 30

[session.dev]
needs = ["backend::convex", "backend::stripe-webhooks"]
resources = ["root::ios-simulator"]
run = "simulator"
linger = 30
