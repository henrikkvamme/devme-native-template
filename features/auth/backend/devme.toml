schema_version = 1

[service.convex]
cmd = "docker info >/dev/null && DEVME_SLOT={slot} CONVEX_PORT={port} ../tooling/convex.sh up"
port = { base = 3210, slot_offset = 20 }
url = "http://{host}:{port}"
health = { http = "http://127.0.0.1:{port}/version" }
readiness = { interval_ms = 1000, timeout_ms = 2000, retries = 180 }
depends_on = ["root::docker"]

[task.codegen]
kind = "utility"
visibility = "internal"
description = "Generate the Confect and Convex boundary code"
cmd = "bun run codegen"
steps = ["root::dependencies"]
timeout = 120

[task.deploy]
kind = "utility"
visibility = "internal"
description = "Publish the current Confect functions to local Convex"
cmd = "DEVME_SLOT={slot} ../tooling/convex.sh deploy"
steps = ["root::dependencies"]
services = ["convex"]
timeout = 180

[task.test]
kind = "check"
visibility = "internal"
description = "Run backend unit and contract tests"
cmd = "bun run test backend"
cwd = ".."
steps = ["root::dependencies"]
timeout = 180

[task.live-smoke]
kind = "check"
visibility = "internal"
description = "Deploy and exercise the backend through its public wire contract"
cmd = "DEVME_SLOT={slot} ../tooling/convex.sh live-smoke"
depends_on = ["deploy"]
steps = ["root::dependencies"]
services = ["convex"]
timeout = 180

[task.auth-live-smoke]
kind = "check"
visibility = "internal"
description = "Verify Better Auth and Convex identity integration"
cmd = "DEVME_SLOT={slot} ../tooling/convex.sh auth-live-smoke"
depends_on = ["deploy"]
steps = ["root::dependencies"]
services = ["convex"]
timeout = 180

[task.auth-doctor]
kind = "utility"
description = "Validate auth, provider, and official-doc readiness without revealing secrets"
cmd = "DEVME_SLOT={slot} ../tooling/convex.sh auth-doctor --strict"
depends_on = ["auth-configure"]
steps = ["root::dependencies"]
services = ["convex"]
timeout = 180

[task.auth-configure]
kind = "utility"
description = "Validate .env.auth.local, apply it to local Convex, and redeploy"
cmd = "DEVME_SLOT={slot} ../tooling/convex.sh auth-configure"
steps = ["root::dependencies"]
services = ["convex"]
timeout = 180

[task.contract-export]
kind = "utility"
visibility = "internal"
description = "Export the deployed Convex function contract for native clients"
cmd = "DEVME_SLOT={slot} ../tooling/convex.sh function-spec"
depends_on = ["deploy"]
steps = ["root::dependencies"]
services = ["convex"]
timeout = 180
artifacts = ["contracts/function-spec.json"]

[task.contract-check]
kind = "check"
visibility = "internal"
description = "Fail when the deployed Convex contract differs from the reviewed manifest"
cmd = "DEVME_SLOT={slot} ../tooling/convex.sh function-spec-check"
depends_on = ["deploy"]
steps = ["root::dependencies"]
services = ["convex"]
timeout = 180

[task.launch]
kind = "launch"
visibility = "internal"
description = "Start Convex and deploy the authenticated backend"
cmd = "true"
depends_on = ["auth-doctor"]
services = ["convex"]
timeout = 180
