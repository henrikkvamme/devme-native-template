schema_version = 1
name = "native"
version = "2026.7.17.11"

[base]
repository = "https://github.com/henrikkvamme/devme-native-template.git"
revision = "2c74e6bf18e683d17f7b126f07a3717a79aec61d"
subdir = "."

[features.auth]
version = "1.2.7"
path = "features/auth"
generated_files = ["backend/convex/betterAuth/_generated/component.ts"]
external_steps = [
  "Choose final iOS and Android application identifiers before creating provider credentials.",
  "Follow the current Better Auth, Apple, Google, and Android Credential Manager links in docs/auth.md.",
  "Run devme and complete its required Apple and Google environment setup, then run devme run backend::auth-configure --output toon.",
]
remove_external_steps = [
  "Delete local auth secrets and revoke provider credentials that are no longer used.",
  "Remove unused Apple and Google application registrations only after confirming no deployed app depends on them.",
]

[features.billing-stripe-external]
version = "1.2.7"
path = "features/billing-stripe-external"
dependencies = ["auth"]
generated_files = ["backend/convex/betterAuth/_generated/component.ts"]
external_steps = [
  "Confirm the app is eligible to use external Stripe billing in every target store and region before exposing checkout.",
  "Create or select a Stripe sandbox product and recurring price.",
  "Run devme to configure STRIPE_SECRET_KEY and STRIPE_PRICE_ID, then rerun devme run backend::auth-configure --output toon.",
  "Keep backend::stripe-webhooks healthy while testing sandbox checkout.",
]
remove_external_steps = [
  "Cancel test subscriptions and remove Stripe webhook endpoints that are no longer needed.",
  "Delete Stripe secrets from local and deployed environments after the final dependent deployment is removed.",
]

[features.release-ios]
version = "1.0.2"
path = "features/release-ios"
external_steps = [
  "Follow docs/ios-xcode-cloud.md to create the Xcode Cloud verification and internal TestFlight workflows.",
  "Protect ios-beta-* tags and keep signing, App Store Connect, privacy, and export-compliance state current.",
]
remove_external_steps = [
  "Delete or disable the Xcode Cloud workflows if this repository should no longer distribute iOS builds.",
]

[features.release-android]
version = "1.0.2"
path = "features/release-android"
external_steps = [
  "Follow docs/android-google-play.md to bootstrap Play App Signing, the internal track, and the protected GitHub environment.",
  "Protect android-beta-* tags and keep the upload key and least-privilege Play service account backed up.",
]
remove_external_steps = [
  "Delete or disable the GitHub environment and workflow credentials if this repository should no longer distribute Android builds.",
]
