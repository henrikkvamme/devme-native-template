name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core:
    name: Tooling and backend
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.13

      - name: Build pinned Devme
        # The v0.4.1 release predates one-shot tasks. Use the reviewed source
        # revision until a release containing the task runner is published.
        env:
          DEVME_REVISION: dc8a4c92b6f1e00ddd0ccb46d80a78fd65b4695b
        run: |
          git clone --filter=blob:none https://github.com/devme-sh/devme.git "$RUNNER_TEMP/devme"
          git -C "$RUNNER_TEMP/devme" checkout --detach "$DEVME_REVISION"
          cargo build --release --locked --workspace --bins --manifest-path "$RUNNER_TEMP/devme/Cargo.toml"
          echo "$RUNNER_TEMP/devme/target/release" >> "$GITHUB_PATH"

      - name: Run portable Devme checks
        run: devme run ci-core --output toon

      - name: Stop local services
        if: always()
        run: devme down || true

  ios:
    name: iOS unit tests
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Test Starter
        run: |
          bash tooling/ios-test.sh && exit 0
          printf 'First simulator attempt failed. Resetting CoreSimulator and retrying once.\n' >&2
          xcrun simctl shutdown all || true
          bash tooling/ios-test.sh

  android:
    name: Android unit tests and lint
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      ANDROID_HOME: ${{ github.workspace }}/.devme/android-sdk
      ANDROID_SDK_ROOT: ${{ github.workspace }}/.devme/android-sdk
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Java
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Install Android SDK packages
        run: bash tooling/android-sdk.sh

      - name: Test and lint Starter
        working-directory: apps/android
        run: ./gradlew testDebugUnitTest lintDebug --no-daemon
