name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core:
    name: Tooling and backend
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.13

      - name: Build pinned Devme
        # Pin the reviewed project-composer revision until it is included in a
        # tagged Devme release.
        env:
          DEVME_REVISION: b2b29f69d23b97059e5a22e91161aedf763b95ae
        run: |
          git clone --filter=blob:none https://github.com/devme-sh/devme.git "$RUNNER_TEMP/devme"
          git -C "$RUNNER_TEMP/devme" checkout --detach "$DEVME_REVISION"
          cargo build --release --locked --workspace --bins --manifest-path "$RUNNER_TEMP/devme/Cargo.toml"
          echo "$RUNNER_TEMP/devme/target/release" >> "$GITHUB_PATH"

      - name: Pull pinned Convex services
        timeout-minutes: 10
        env:
          CONVEX_INSTANCE_SECRET: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
        run: docker compose --file infrastructure/convex/compose.yaml pull

      - name: Prepare non-production auth fixture
        env:
          DEVME_CI_WITH_STRIPE: "1"
        run: tooling/ci-auth-fixture.sh

      - name: Run portable Devme checks
        timeout-minutes: 20
        run: devme run ci-core --output toon

      - name: Preserve backend diagnostics
        if: failure()
        run: |
          devme doctor --output json || true
          devme logs --since 30m --json || true
          docker ps --all || true

      - name: Exercise the public project recipe
        run: devme run recipe-e2e --output toon

      - name: Stop local services
        if: always()
        run: devme down || true

  ios:
    name: iOS unit tests
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Test Starter
        run: |
          bash tooling/ios-test.sh && exit 0
          printf 'First simulator attempt failed. Erasing CoreSimulator and retrying once.\n' >&2
          xcrun simctl shutdown all || true
          xcrun simctl erase all
          rm -rf .devme/DerivedData-0
          bash tooling/ios-test.sh

      - name: Preserve iOS test diagnostics
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ios-test-diagnostics
          path: .devme/DerivedData-0/Logs/Test/*.xcresult
          if-no-files-found: warn
          retention-days: 7

  android:
    name: Android unit tests and lint
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      ANDROID_HOME: ${{ github.workspace }}/.devme/android-sdk
      ANDROID_SDK_ROOT: ${{ github.workspace }}/.devme/android-sdk
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Java
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Install Android SDK packages
        run: bash tooling/android-sdk.sh

      - name: Test and lint Starter
        working-directory: apps/android
        run: ./gradlew testDebugUnitTest lintDebug --no-daemon
