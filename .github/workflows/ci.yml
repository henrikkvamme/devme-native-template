name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core:
    name: Tooling and backend
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.13

      - name: Install Devme
        env:
          DEVME_VERSION: 0.4.1
          DEVME_SHA256: b3a69268211ad8bcf3b6fdc7743b047f0d3082ded2cdd3a63d7173aa406ee950
        run: |
          archive="$RUNNER_TEMP/devme.tar.gz"
          destination="$RUNNER_TEMP/devme-bin"
          curl -fsSL "https://github.com/devme-sh/devme/releases/download/v${DEVME_VERSION}/devme-x86_64-unknown-linux-gnu.tar.gz" -o "$archive"
          printf '%s  %s\n' "$DEVME_SHA256" "$archive" | sha256sum --check
          mkdir -p "$destination"
          tar -xzf "$archive" -C "$destination"
          echo "$destination" >> "$GITHUB_PATH"

      - name: Run portable Devme checks
        run: devme run ci-core --output toon

      - name: Stop local services
        if: always()
        run: devme down || true

  ios:
    name: iOS unit tests
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Test Starter
        run: bash tooling/ios-test.sh

  android:
    name: Android unit tests and lint
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Java
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Install Android SDK packages
        run: |
          set +o pipefail
          yes | sdkmanager --licenses >/dev/null
          set -o pipefail
          sdkmanager "build-tools;36.0.0" "platforms;android-37.0"

      - name: Test and lint Starter
        working-directory: apps/android
        run: ./gradlew testDebugUnitTest lintDebug --no-daemon
